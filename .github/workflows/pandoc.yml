name: Build and Release Master Hyper-V Guide

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Latest Pandoc
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        PANDOC_VERSION=$(wget -qO- https://api.github.com/repos/jgm/pandoc/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
        echo "Installing pandoc ${PANDOC_VERSION}"
        wget "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-1-amd64.deb"
        sudo dpkg -i "pandoc-${PANDOC_VERSION}-1-amd64.deb"
        pandoc --version

    - name: Install Fonts
      run: |
        sudo apt-get install -y fonts-dejavu fonts-liberation fonts-liberation2

    - name: Install LaTeX
      # texlive-latex-extra includes longtable, booktabs, fancyvrb, and other
      # packages that pandoc's LaTeX template requires for tables and code blocks.
      # texlive-fonts-recommended adds lmodern, which gives clean PDF body text.
      run: sudo apt-get install -y texlive-latex-extra texlive-fonts-recommended

    - name: Generate DOCX
      run: |
        pandoc -s --toc --toc-depth=3 \
          --metadata title="Master Hyper-V" \
          --metadata author="Marc Mylemans" \
          --reference-doc=template.docx \
          -o MasterHyper-V.docx \
          $(cat book-order.txt)

    - name: Generate PDF
      # PDF is generated directly from the markdown source files using pandoc's
      # LaTeX engine. This produces a clean, typeset PDF without going through
      # DOCX (which required LibreOffice and produced inconsistent output).
      run: |
        pandoc -s --toc --toc-depth=3 \
          --metadata title="Master Hyper-V" \
          --metadata author="Marc Mylemans" \
          --variable geometry:margin=1in \
          --variable fontsize=11pt \
          --variable colorlinks=true \
          --variable linkcolor=0F4761 \
          --variable urlcolor=156082 \
          --variable toccolor=0F4761 \
          -o MasterHyper-V.pdf \
          $(cat book-order.txt)

    - name: Upload PDF as artifact
      uses: actions/upload-artifact@v4
      with:
        name: MasterHyper-V.pdf
        path: MasterHyper-V.pdf

    - name: Upload DOCX as artifact
      uses: actions/upload-artifact@v4
      with:
        name: MasterHyper-V.docx
        path: MasterHyper-V.docx

    - name: Get the current date and time
      id: vars
      run: echo "date=$(date +'%Y%m%d%H%M')" >> $GITHUB_ENV

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      with:
        tag_name: v${{ env.date }}
        release_name: Release v${{ env.date }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.HYPERVGUIDE_TOKEN }}

    - name: Upload PDF Release Asset
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./MasterHyper-V.pdf
        asset_name: MasterHyper-V-${{ env.date }}.pdf
        asset_content_type: application/pdf
      env:
        GITHUB_TOKEN: ${{ secrets.HYPERVGUIDE_TOKEN }}

    - name: Upload DOCX Release Asset
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./MasterHyper-V.docx
        asset_name: MasterHyper-V-${{ env.date }}.docx
        asset_content_type: application/vnd.openxmlformats-officedocument.wordprocessingml.document
      env:
        GITHUB_TOKEN: ${{ secrets.HYPERVGUIDE_TOKEN }}
